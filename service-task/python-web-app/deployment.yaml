apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-app-depl
  labels:
    app: python-web-app
    tier: task-tier
spec:
  replicas: 2
  selector:
    matchLabels:
      app: python-web-app
  template:
    metadata:
      labels:  # reference this in service selector
        app: python-web-app
        tier: python-app 
    spec:
      containers:
        - name: python-web-app
          image: shriram2105/python-web-app:1.0.0
          ports:
            - containerPort: 8000
